<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SV MART</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#2e7d32,#4caf50);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:90%;
    max-width:650px;
    padding:50px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.logo{
    font-size:60px;
}

h1{
    color:#2e7d32;
    margin-top:15px;
    margin-bottom:10px;
}

p{
    color:#555;
    font-size:18px;
    line-height:1.7;
    margin-bottom:35px;
}

.button{
    display:block;
    text-decoration:none;
    background:#2e7d32;
    color:white;
    padding:16px;
    margin:15px 0;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.button:hover{
    background:#1b5e20;
}

.footer{
    margin-top:35px;
    color:#777;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">🛒</div>

<h1>SV MART</h1>

<p>
Welcome to <strong>SV MART</strong>.

Your trusted online grocery shopping application for fresh fruits,
vegetables, groceries, dairy products, household essentials and more.

Choose one of the options below.
</p>

<a href="profile.html" class="button">
👤 View Profile
</a>

<a href="privacy-policy.html" class="button">
🔒 Privacy Policy
</a>

<div class="footer">

SV MART App v1.0.0

<br><br>

© 2026 SV MART. All Rights Reserved.

</div>

</div>

</body>
</html>
